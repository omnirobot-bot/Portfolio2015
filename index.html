	/* 
		Eric Meyer's CSS Reset
		http://meyerweb.com/eric/tools/css/reset/ 
		v2.0 | 20110126
   		License: none (public domain)
	*/
	
	html, body, div, span, applet, object, iframe,
	h1, h2, h3, h4, h5, h6, p, blockquote, pre,
	a, abbr, acronym, address, big, cite, code,
	del, dfn, em, img, ins, kbd, q, s, samp,
	small, strike, strong, sub, sup, tt, var,
	b, u, i, center,
	dl, dt, dd, ol, ul, li,
	fieldset, form, label, legend,
	table, caption, tbody, tfoot, thead, tr, th, td,
	article, aside, canvas, details, embed, 
	figure, figcaption, footer, header, hgroup, 
	menu, nav, output, ruby, section, summary,
	time, mark, audio, video {
		margin: 0;
		padding: 0;
		border: 0;
		font: inherit;
		vertical-align: baseline;
	}
	html {
		font-size: 62.5%; 
	}
	/* HTML5 display-role reset for older browsers */
	article, aside, details, figcaption, figure, 
	footer, header, hgroup, menu, nav, section {
		display: block;
	}
	body {
		line-height: 1;
	}
	html, body { overflow-x: hidden; overscroll-behavior-x: none; }
	ol, ul {
		list-style: none;
	}
	blockquote, q {
		quotes: none;
	}
	blockquote:before, blockquote:after,
	q:before, q:after {
		content: '';
		content: none;
	}
	table {
		border-collapse: collapse;
		border-spacing: 0;
	}

/*	--------------------------------------------------
	Buttons
	-------------------------------------------------- */

	.button {
		background: #3a83b3;
		border: none;
		display: inline-block;
		text-align: center;
		padding: 9px 14px;
		color: #fff;
		text-decoration: none;
		line-height: 1;
		position: relative;
		cursor: pointer;
		text-transform: uppercase;
		-moz-border-radius: 4px;
		-webkit-border-radius: 4px;
		border-radius: 4px;
		-webkit-box-shadow: 0px 4px 2px -2px #a3a3a3; 
		box-shadow: 0px 4px 2px -2px #a3a3a3; 
		
	}
	
	.button.nice { 
		background: #3a83b3 url(../images/button-gloss.png) repeat-x 0 -34px;
		-moz-box-shadow: inset 0 1px 0 rgba(255,255,255,.5);
		-webkit-box-shadow: inset 0 1px 0 rgba(255,255,255,.5);
		text-shadow: 0 -1px 1px rgba(0,0,0,0.28);
		background: #00a6fc url(../images/button-gloss.png) repeat-x 0 -34px, -moz-linear-gradient(top, rgba(255,255,255,.4) 0%, transparent 100%);
		background: #00a6fc url(../images/button-gloss.png) repeat-x 0 -34px, -webkit-gradient(linear, left top, left bottom, color-stop(0%,rgba(255,255,255,.4)), color-stop(100%,transparent));
		border: 1px solid #0593dc;
		-webkit-transition: background-color .15s ease-in-out;
		-moz-transition: background-color .15s ease-in-out;
		-o-transition: background-color .15s ease-in-out; 
	}

	.button.radius { 
		-moz-border-radius: 3px;
		-webkit-border-radius: 3px;
		border-radius: 3px;
	}
	.button.round { 
		-moz-border-radius: 1000px;
		-webkit-border-radius: 1000px;
		border-radius: 1000px;
	}
	
	.button.full-width { 
		width: 100%;
		padding-left: 0 !important;
		padding-right: 0 !important;
		text-align: center; 
	}
	
	.button.left-align { 
		text-align: left; 
		text-indent: 12px;
	}
	
	.button:active {}
	
	/* Sizes ---------- */
	.small.button 			{ font-size: 16px; padding: 6px 8px 5px 8px; }
	.medium.button 			{ font-size: 13px; }
	.large.button 			{ font-size: 18px; padding: 11px 48px 13px; }
	
	/* Nice Sizes ---------- */
	.nice.small.button 		{ background-position: 0 -36px; }
	.nice.large.button 		{ background-position: 0 -30px; }
	 
	/* Colors ---------- */
	.blue.button			{ background-color: #00a6fc;  }
	.red.button				{ background-color: #e91c21; }
	.white.button			{ background-color: #e9e9e9; color: #333; }
	.charcoal.button		{ background-color: #141414; }
	
	/* Nice Colors ---------- */
	.nice.blue.button		{ border: 1px solid #0593dc;  }
	.nice.red.button		{ border: 1px solid #b90b0b;  }
	.nice.white.button		{ border: 1px solid #cacaca; text-shadow: none !important; }
	.nice.charcoal.button	{ border: 1px solid #000; }
	
	/* Hovers ---------- */
	.button:hover 			{ background-color: #0192dd; color: #fff; }
	.blue.button:hover		{ background-color: #0192dd; 	}
	.red.button:hover 		{ background-color: #d01217; 	}
	.white.button:hover		{ background-color: #dadada; color: #333; }
	.charcoal.button:hover	{ background-color: #000; }
	
	

/*    --------------------------------------------------
    Tabs
    -------------------------------------------------- */
    dl.tabs { display: block; margin: 0 0 20px 0; padding: 0; height: 30px; border-bottom: solid 1px #ddd; }
    dl.tabs dt { display: block; width: auto; height: 30px; padding: 0px 9px 0 20px; line-height: 30px; float: left; color: #999; font-size: 11px; text-transform: uppercase; cursor: default; }
    dl.tabs dt:first-child { padding: 0 9px 0 0px; }
    dl.tabs dd { display: block; width: auto; height: 30px; padding: 0; float: left; }
    dl.tabs dd a { display: block; width: auto; height: 29px; padding: 0px 9px; line-height: 30px; border: solid 1px #ddd; margin: 0 -1px 0 0; color: #555; background: #eee; }
    dl.tabs dd a.active { background: #fff; border-width: 1px 1px 0px 1px; height: 30px; }

		.nice.tabs { border-bottom: solid 1px #eee; margin: 0 0 30px 0; height:43px; }
		.nice.tabs dd a { padding: 7px 18px 9px; font-size: 15px; font-size: 1.5rem; color: #555555; background: none; border: none; }
		.nice.tabs dd a.active { font-weight: bold; color: #333; background: #fff; border-left: 1px solid #eee; border-right: 1px solid #eee; border-top: 3px solid #00a6fc; margin: 0 10px; position: relative; top: -5px; }
		.nice.tabs dd:first-child a.active { margin-left: 0; }
    
    ul.tabs-content { margin: 0; display: block; }
    ul.tabs-content > li { display:none; }
    ul.tabs-content > li.active { display: block; }
    
    dl.contained, dl.nice.contained { margin-bottom: 0px; }
    dl.contained.tabs dd a { padding: 0px 14px; }
    dl.nice.contained.tabs dd a { padding: 7px 18px 9px; }
    
    ul.contained.tabs-content { padding: 0; }
    ul.contained.tabs-content li { padding: 20px; border: solid 0px #ddd; border-width: 0px 1px 1px 1px; }
    ul.nice.contained.tabs-content li { border-color: #eee; }
    
/*  --------------------------------------------------
    Pagination
    -------------------------------------------------- */ 
    ul.pagination { display: block; height: 24px; margin-left: -5px; }
    ul.pagination li { float: left; display: block; height: 24px; color: #999; font-size: 15px; margin-left: 5px; }
    ul.pagination li a { display: block; padding: 6px 7px 4px; color: #555; }
    ul.pagination li.current a, ul.pagination li:hover a { border-bottom: solid 2px #00a6fc; color: #141414; }
    ul.pagination li.unavailable a { cursor: default; color: #999; }
    ul.pagination li.unavailable:hover a { border-bottom: none; }
    
    
/*  --------------------------------------------------
    Lists
    -------------------------------------------------- */ 
    ul.nice, ol.nice { list-style: none; margin: 0; }
    ul.nice li, ol.nice li { padding-left: 13px; position: relative }
    ul.nice li span.bullet, ol.nice li span.number { position: absolute; left: 0px; top: 0px; color: #ccc; }

/* Alerts cannot be closed and notices can */

	.notice, .alert { 
		position: relative;
	    background: #222 url(../images/button-overlay.png) repeat-x bottom;
	    width: 100%;
	    margin: 10px 0;

  display: flex;
  align-items: center;
  margin-left: 6px;
  opacity: 0.45;
  transition: opacity 0.2s;
}
.mcard.expanded .chevron-toggle { opacity: 1; }
.chevron-toggle svg {
  transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
}
.mcard.expanded .chevron-toggle svg {
  transform: rotate(180deg);
}
/* Collapsible wrapper — grid trick: no max-height timing issues */
.card-detail-wrap {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows 0.38s cubic-bezier(0.4, 0, 0.2, 1);
}
.mcard.expanded .card-detail-wrap {
  grid-template-rows: 1fr;
}
.card-detail-inner {
  overflow: hidden;
  min-height: 0;
}
/* Divider inside collapsible (only visible when expanded) */
.card-divider {
  height: 1px;
  background: rgba(255,255,255,0.15);
  margin: 4px 12px 10px;
}

/* ── Hidden cards (Masonry ignores display:none via querySelectorAll) ── */
.mcard.mhidden { display: none !important; }

/* ── Lightbox ── */
#lb {
  display: none; position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.9); z-index: 9999;
  align-items: flex-start; justify-content: center;
  overflow: auto; cursor: zoom-out;
  padding: 40px;
  touch-action: pan-y pinch-zoom;
}
body.lb-open { position: fixed; width: 100%; overflow-y: scroll; }
#lb.open { display: flex; }
#lb img { max-width: none; max-height: none; border-radius: 4px; cursor: zoom-out; }
@media (max-width: 768px) {
  #lb { padding: 0; }
  #lb.open { display: block; overflow-y: auto; }
  #lb img { display: block; width: 100vw; height: auto; border-radius: 0; touch-action: pan-y pinch-zoom; margin: 0; }
}

/* ── Responsive ── */
@media (max-width: 1200px) {
  .grid-sizer, .mcard { width: calc(25% - 9px) !important; }
}
@media (max-width: 1100px) {
  .grid-sizer, .mcard { width: calc(25% - 9px) !important; }
}
@media (max-width: 860px) {
  .grid-sizer, .mcard { width: calc(33.333% - 8px) !important; }
}
@media (max-width: 720px) {
  .grid-sizer, .mcard { width: calc(50% - 6px) !important; }
}
@media (max-width: 480px) {
  .grid-sizer, .mcard { width: 100% !important; }
}

function buildCardFromData(data){
  var title=data.title||'';
  var imgSrc=data.img||'';
  var subtitle=data.subtitle||'';
  var isDetail=!!data.detail;
  var cats=data.cats||[];

  var card=document.createElement('div'); card.className='mcard';

  // Nahled
  var nahled=document.createElement('div'); nahled.className='nahled';
  var imgEl=document.createElement('img'); imgEl.src=imgSrc; imgEl.alt=title;
  nahled.appendChild(imgEl);
  card.dataset.cats=cats.join('|');
  if(cats.length){
    var pw=document.createElement('div'); pw.className='pills-wrap';
    cats.forEach(function(c){ var p=document.createElement('span'); p.className='cat-pill'; p.textContent=c; pw.appendChild(p); });
    nahled.appendChild(pw);
  }
  var ov=document.createElement('div'); ov.className='hover-overlay'; ov.innerHTML=EYE;
  nahled.appendChild(ov);
  nahled.addEventListener('click',function(e){ e.preventDefault(); if(Date.now()-_expandedAt<600) return; var lb=document.getElementById('lb'); document.getElementById('lb-img').src=imgSrc; lb.classList.add('open'); lb.scrollTop=0; _lbScroll=window.scrollY; document.body.style.top='-'+_lbScroll+'px'; document.body.classList.add('lb-open'); });
  card.appendChild(nahled);

  // Title (+ chevron for detail cards)
  var nh4=document.createElement('h4'); nh4.textContent=title;
  if(isDetail){
    card.classList.add('has-detail');
    var chevSpan=document.createElement('span'); chevSpan.className='chevron-toggle';
    chevSpan.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 4 12 10 18 4"/><polyline points="6 13 12 19 18 13"/></svg>';
    nh4.appendChild(chevSpan);
  }
  card.appendChild(nh4);

  // Subtitle (non-detail cards only)
  if(subtitle&&!isDetail){ var nh5=document.createElement('h5'); nh5.textContent=subtitle; card.appendChild(nh5); }

  // Collapsible detail
  if(isDetail){
    var dt=data.detail;
    var dd=document.createElement('div'); dd.className='card-detail';
    dd.innerHTML='<div class="card-detail-block"><div class="card-detail-label">Výzva</div><div class="card-detail-text">'+dt.vyzva+'</div></div>'+
      '<div class="card-detail-block"><div class="card-detail-label">Řešení</div><div class="card-detail-text">'+dt.reseni+'</div></div>'+
      '<div class="card-detail-block"><div class="card-detail-label">Výsledek</div><div class="card-detail-text">'+dt.vysledek+'</div></div>';
    var divider=document.createElement('div'); divider.className='card-divider';
    var inner=document.createElement('div'); inner.className='card-detail-inner';
    inner.appendChild(divider); inner.appendChild(dd);
    var wrap=document.createElement('div'); wrap.className='card-detail-wrap';
    wrap.appendChild(inner);
    card.appendChild(wrap);
  }

  card.addEventListener('click',function(e){
    if(e.target.closest('.nahled')) return;
    if(!this.classList.contains('has-detail')) return;
    this.classList.toggle('expanded');
    _expandedAt=Date.now();
    _doLayout();
  });
  return card;
}

window.addEventListener('load', function(){

  // ── 1. Build cards ──────────────────────────────────────────────────
  var ordered=CARDS.map(function(data){ return buildCardFromData(data); });

  // ── 2. Build flat masonry container ─────────────────────────────────
  var flat=document.createElement('div'); flat.id='masonry-flat';
  var sizer=document.createElement('div'); sizer.className='grid-sizer';
  flat.appendChild(sizer);
  ordered.forEach(function(c){ flat.appendChild(c); });
  var header=document.querySelector('.container header');
  if(header&&header.parentNode) header.parentNode.insertBefore(flat,header.nextSibling);
  else document.body.appendChild(flat);

  // ── 3. Collect categories ────────────────────────────────────────────
  var allCatSet={};
  flat.querySelectorAll('.mcard').forEach(function(c){
    (c.dataset.cats||'').split('|').forEach(function(cat){ if(cat) allCatSet[cat]=1; });
  });
  var chipOrder=['Corporate Identity','Obalový design','Produktový design','Design nábytku','Architektura','Webdesign'];
  var allCats=chipOrder.filter(function(c){ return allCatSet[c]; });

  // ── 4. activeSet: all ON by default ─────────────────────────────────
  var activeSet={};
  allCats.forEach(function(c){ activeSet[c]=true; });

  // ── 5. Apply URL param BEFORE building chips and Masonry ─────────────
  var urlCat=(new URLSearchParams(window.location.search)).get('cat');
  if(urlCat){
    var urlNorms=urlCat.split(',').map(function(s){
      return s.trim().toLowerCase().replace(/-/g,' ')
        .replace('obalovy design','obalový design')
        .replace('produktovy design','produktový design')
        .replace('design nabytku','design nábytku')
        .replace(/^ci$/,'corporate identity');
    });
    var urlMatched=allCats.filter(function(c){ return urlNorms.indexOf(c.toLowerCase())!==-1; });
    if(urlMatched.length){
      allCats.forEach(function(c){ activeSet[c]=(urlMatched.indexOf(c)!==-1); });
    }
  }

  // ── 6. Visibility helper ─────────────────────────────────────────────
  function applyVisibility(){
    var allOn=allCats.every(function(c){ return activeSet[c]; });
    flat.querySelectorAll('.mcard').forEach(function(card){
      if(allOn){ card.classList.remove('mhidden'); return; }
      var cardCats=(card.dataset.cats||'').split('|');
      card.classList.toggle('mhidden', !cardCats.some(function(c){ return activeSet[c]; }));
    });
  }

  // ── 7. Masonry ───────────────────────────────────────────────────────
  var msnry=null;

  // After a full Masonry layout, record each card's column (left %) and order within it.
  function freezeColumns(){
    var cols={};
    flat.querySelectorAll('.mcard:not(.mhidden)').forEach(function(card){
      var left=card.style.left||'0%';
      var top=parseFloat(card.style.top)||0;
      if(!cols[left]) cols[left]=[];
      cols[left].push({card:card,top:top});
    });
    Object.keys(cols).forEach(function(left){
      cols[left].sort(function(a,b){return a.top-b.top;});
      cols[left].forEach(function(item,i){
        item.card._frozenLeft=left;
        item.card._colOrder=i;
      });
    });
  }

  // Custom layout that keeps cards in their frozen columns.
  // Reads all heights first (one reflow), then writes positions (no thrashing).
  function layoutFrozenColumns(){
    var cards=flat.querySelectorAll('.mcard:not(.mhidden)');
    // Read phase
    var heights=[];
    cards.forEach(function(card,i){ heights[i]=card.offsetHeight; });
    // Group by frozen column
    var cols={};
    cards.forEach(function(card,i){
      var left=card._frozenLeft;
      if(left==null) return;
      if(!cols[left]) cols[left]=[];
      cols[left].push({card:card,h:heights[i]});
    });
    // Write phase: recalculate top within each column
    var gutter=12, maxBottom=0;
    Object.keys(cols).forEach(function(left){
      var col=cols[left].sort(function(a,b){return (a.card._colOrder||0)-(b.card._colOrder||0);});
      var top=0;
      col.forEach(function(item){
        item.card.style.left=left;
        item.card.style.top=top+'px';
        top+=item.h+gutter;
      });
      maxBottom=Math.max(maxBottom,top-gutter);
    });
    flat.style.height=maxBottom+'px';
  }

  function initMsnry(){
    applyVisibility();
    if(msnry) msnry.destroy();
    msnry=new Masonry(flat,{
      itemSelector:'.mcard:not(.mhidden)',
      columnWidth:'.grid-sizer',
      gutter:12,
      percentPosition:true,
      transitionDuration:0
    });
    freezeColumns();
  }

  function applyFilter(){
    applyVisibility();
    if(msnry){ msnry.reloadItems(); msnry.layout(); freezeColumns(); }
  }

  // ── 7b. Smooth layout during card expand/collapse ────────────────────
  // Uses custom layoutFrozenColumns() — cards stay in their columns.
  var _layoutRaf=null;
  function startLayoutLoop(){
    if(_layoutRaf) return;
    var end=Date.now()+480;
    function loop(){
      layoutFrozenColumns();
      _layoutRaf=Date.now()<end ? requestAnimationFrame(loop) : null;
    }
    _layoutRaf=requestAnimationFrame(loop);
  }
  _doLayout=startLayoutLoop;
  flat.addEventListener('transitionrun',function(e){
    if(e.target.classList&&e.target.classList.contains('card-detail-wrap')) startLayoutLoop();
  },false);

  // Init after images load
  var imgs=flat.querySelectorAll('img');
  var loaded=0, total=Math.max(imgs.length,1);
  function tryInit(){ if(++loaded>=total) initMsnry(); }
  if(!imgs.length) initMsnry();
  else imgs.forEach(function(img){
    if(img.complete) tryInit();
    else{ img.addEventListener('load',tryInit); img.addEventListener('error',tryInit); }
  });

  window.addEventListener('resize',function(){
    clearTimeout(window._msTimer);
    window._msTimer=setTimeout(function(){
      if(msnry){ msnry.layout(); freezeColumns(); }
    },150);
  });

  // ── 8. Build filter bar ──────────────────────────────────────────────
  var bar=document.createElement('div'); bar.id='filter-bar';
  var hint=document.createElement('div'); hint.id='filter-hint';
  hint.textContent='dvojklik = zobrazit pouze tuto kategorii';
  var oldBar=document.getElementById('filter-bar');
  if(oldBar) oldBar.remove();
  flat.parentNode.insertBefore(bar,flat);
  flat.parentNode.insertBefore(hint,flat);

  allCats.forEach(function(cat){
    var chip=document.createElement('span');
    chip.className='fchip'+(activeSet[cat]?' active':' inactive');
    var checkWrap=document.createElement('span');
    checkWrap.className='chip-check';
    checkWrap.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
    chip.appendChild(checkWrap);
    var label=document.createElement('span');
    label.textContent=cat;
    chip.appendChild(label);

    function refreshChips(){
      bar.querySelectorAll('.fchip').forEach(function(ch){
        var chCat=ch.querySelector('span:last-child').textContent;
        ch.classList.toggle('active', !!activeSet[chCat]);
        ch.classList.toggle('inactive', !activeSet[chCat]);
      });
    }

    chip.addEventListener('click',function(){
      activeSet[cat]=!activeSet[cat];
      refreshChips();
      applyFilter();
    });

    chip.addEventListener('dblclick',function(e){
      e.preventDefault();
      var soloActive=allCats.every(function(c){ return c===cat?activeSet[c]:!activeSet[c]; });
      if(soloActive){ allCats.forEach(function(c){ activeSet[c]=true; }); }
      else           { allCats.forEach(function(c){ activeSet[c]=(c===cat); }); }
      refreshChips();
      applyFilter();
    });

    bar.appendChild(chip);
  });

  // ── 9. Lightbox ──────────────────────────────────────────────────────
  function closeLb(){ document.getElementById('lb').classList.remove('open'); document.body.classList.remove('lb-open'); document.body.style.top=''; window.scrollTo(0,_lbScroll||0); }
  document.getElementById('lb').addEventListener('click',closeLb);
  document.addEventListener('keydown',function(e){ if(e.key==='Escape') closeLb(); });

}); // end window.load
})();
</script>
